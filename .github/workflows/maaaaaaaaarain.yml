name: Download All Videos from links.txt (One Shot)

on:
  workflow_dispatch:
    inputs:
      quality:
        description: 'Video quality for all downloads'
        required: true
        type: choice
        default: '720p'
        options:
          - 'best'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
          - '240p'
          - '144p'

jobs:
  download-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp, FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp

      - name: Connect to Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: client
          stack: ipv4

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Process all links from links.txt
        env:
          QUALITY: ${{ inputs.quality }}
        run: |
          # Helper: convert quality to yt-dlp format
          get_format() {
            local q="$1"
            if [ "$q" = "best" ]; then
              echo "bestvideo+bestaudio/best"
            else
              local height=$(echo "$q" | sed 's/p//')
              echo "bestvideo[height<=${height}]+bestaudio/best[height<=${height}]"
            fi
          }
          FORMAT=$(get_format "$QUALITY")

          # If links.txt doesn't exist or is empty, exit gracefully
          if [ ! -s links.txt ]; then
            echo "No links in links.txt. Exiting."
            exit 0
          fi

          # Read all URLs (comma separated, one line)
          RAW_LINKS=$(cat links.txt | tr -d '\n')
          IFS=',' read -ra URL_ARRAY <<< "$RAW_LINKS"

          # We'll build a new content for links.txt containing only failed URLs
          FAILED_URLS=()
          SUCCESSFUL_URLS=()

          for url in "${URL_ARRAY[@]}"; do
            url=$(echo "$url" | xargs)  # trim whitespace
            if [ -z "$url" ]; then
              continue
            fi

            echo "🎬 Downloading: $url"
            yt-dlp -f "$FORMAT" \
              -o "downloads/%(title)s.%(ext)s" \
              --merge-output-format mp4 \
              --extractor-arg "youtube:player_client=android" \
              --extractor-arg "youtube:po_token=android" \
              "$url"

            if [ $? -eq 0 ]; then
              # Split files larger than 95MB
              find downloads -name "*.mp4" -type f -mmin -0.1 -print0 | while IFS= read -r -d '' file; do
                MAX_SIZE=$((95 * 1024 * 1024))
                FILE_SIZE=$(stat -c%s "$file")
                if [ $FILE_SIZE -gt $MAX_SIZE ]; then
                  echo "📦 Splitting $file (size >95MB)"
                  dir=$(dirname "$file")
                  base=$(basename "$file" .mp4)
                  split -b 95M "$file" "${dir}/${base}_part_"
                  rm "$file"
                fi
              done
              echo "✅ Success: $url"
              SUCCESSFUL_URLS+=("$url")
            else
              echo "❌ Failed: $url (will keep in links.txt)"
              FAILED_URLS+=("$url")
            fi
          done

          # Update links.txt: keep only failed URLs (comma separated)
          if [ ${#FAILED_URLS[@]} -eq 0 ]; then
            # No failed URLs -> empty the file
            > links.txt
            echo "All URLs processed successfully. links.txt cleared."
          else
            # Rebuild links.txt with failed URLs
            printf "%s" "${FAILED_URLS[0]}" > links.txt
            for ((i=1; i<${#FAILED_URLS[@]}; i++)); do
              printf ",%s" "${FAILED_URLS[i]}" >> links.txt
            done
            echo "Some URLs failed. Remaining in links.txt: ${#FAILED_URLS[@]} URL(s)"
          fi

          # Optionally, create a log of successfully downloaded URLs
          if [ ${#SUCCESSFUL_URLS[@]} -gt 0 ]; then
            echo "### Successfully downloaded on $(date)" >> downloaded.log
            for url in "${SUCCESSFUL_URLS[@]}"; do
              echo "$url" >> downloaded.log
            done
          fi

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Processed all links from links.txt"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: "downloads/* links.txt downloaded.log"
