name: Download YouTube 144p (WARP + PO Token)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
        default: 'https://www.youtube.com/watch?v=GvhlIFJaqS4'
      output_filename:
        description: 'Output filename (without extension)'
        required: false
        type: string
        default: 'video_144p'

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # This step installs the tools needed to run yt-dlp.
      - name: Install yt-dlp, FFmpeg, and Deno JS runtime
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      # This step uses the dedicated GitHub Action to set up the WARP VPN.
      - name: Connect to Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: client
          stack: ipv4

      - name: Verify WARP is active
        run: curl -s ifconfig.me

      - name: Create downloads directory
        run: mkdir -p downloads

      # This final download command now uses WARP, the Android client, and a PO token.
      - name: Download video (144p) with PO Token and Android Client
        run: |
          yt-dlp -f "bestvideo[height<=144]+bestaudio/best" \
            -o "downloads/${{ inputs.output_filename }}.%(ext)s" \
            --merge-output-format mp4 \
            --extractor-arg "youtube:player_client=android" \
            --extractor-arg "youtube:po_token=android" \
            "${{ inputs.video_url }}"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Download YouTube 144p: ${{ inputs.video_url }}"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: "downloads/*"
