name: Download YouTube 144p (Proxy)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
        default: 'https://www.youtube.com/watch?v=GvhlIFJaqS4'
      output_filename:
        description: 'Output filename (without extension)'
        required: false
        type: string
        default: 'video_144p'

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl jq
          pip install --upgrade yt-dlp

      - name: Find working free proxy
        id: find_proxy
        run: |
          echo "🔍 Fetching list of working proxies..."
          PROXY=""
          PROXY_SOURCES=(
            "https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http&timeout=5000&country=all&ssl=all&anonymity=anonymous"
            "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt"
            "https://raw.githubusercontent.com/ShiftyTR/Proxy-List/master/http.txt"
            "https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/http.txt"
          )
          
          for SOURCE in "${PROXY_SOURCES[@]}"; do
            echo "📡 Trying proxy source: $SOURCE"
            PROXIES=$(curl -s "$SOURCE" | grep -Eo '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+' | head -5)
            
            for IP in $PROXIES; do
              echo "Testing proxy: $IP"
              if curl -s -x "http://$IP" --max-time 5 https://api.ipify.org > /dev/null 2>&1; then
                PROXY="$IP"
                echo "✅ Found working proxy: $PROXY"
                break 2
              fi
            done
          done
          
          if [ -z "$PROXY" ]; then
            echo "⚠️ No working proxy found, falling back to none"
            PROXY=""
          fi
          
          echo "proxy=$PROXY" >> $GITHUB_OUTPUT

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download video (144p) with proxy
        run: |
          PROXY="${{ steps.find_proxy.outputs.proxy }}"
          if [ -n "$PROXY" ]; then
            echo "🌐 Downloading via proxy: $PROXY"
            yt-dlp --proxy "http://$PROXY" \
              -f "bestvideo[height<=144]+bestaudio/best" \
              -o "downloads/${{ inputs.output_filename }}.%(ext)s" \
              --merge-output-format mp4 \
              "${{ inputs.video_url }}"
          else
            echo "🌐 Downloading without proxy (bypass may fail)"
            yt-dlp \
              -f "bestvideo[height<=144]+bestaudio/best" \
              -o "downloads/${{ inputs.output_filename }}.%(ext)s" \
              --merge-output-format mp4 \
              "${{ inputs.video_url }}"
          fi

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Download YouTube 144p: ${{ inputs.video_url }}"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: "downloads/*"
