name: Download YouTube 144p (via Cloudflare WARP – wgcf method)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
        default: 'https://www.youtube.com/watch?v=GvhlIFJaqS4'
      output_filename:
        description: 'Output filename (without extension)'
        required: false
        type: string
        default: 'video_144p'

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install WireGuard tools and download wgcf
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wireguard-tools curl
          curl -Lo wgcf https://github.com/ViRb3/wgcf/releases/download/v2.2.17/wgcf_2.2.17_linux_amd64
          chmod +x wgcf

      # Register with Cloudflare WARP and generate WireGuard config
      - name: Setup Cloudflare WARP (wgcf)
        run: |
          # Automatic registration (accepts ToS)
          echo "yes" | ./wgcf register
          ./wgcf generate
          # Use Cloudflare DNS
          sed -i 's/^DNS = .*/DNS = 1.1.1.1/' wgcf-profile.conf
          # Bring up the tunnel
          sudo wg-quick up wgcf-profile.conf
          sleep 5
          echo "Public IP after WARP:"
          curl -s ifconfig.me

      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp

      - name: Setup YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YT_COOKIES }}

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download video (144p)
        run: |
          yt-dlp -f "bestvideo[height<=144]+bestaudio/best" \
            -o "downloads/${{ inputs.output_filename }}.%(ext)s" \
            --merge-output-format mp4 \
            "${{ inputs.video_url }}"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Download YouTube 144p: ${{ inputs.video_url }}"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: "downloads/*"
