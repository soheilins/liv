name: Download YouTube 144p (via Cloudflare WARP)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
        default: 'https://www.youtube.com/watch?v=GvhlIFJaqS4'
      output_filename:
        description: 'Output filename (without extension)'
        required: false
        type: string
        default: 'video_144p'

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cloudflare WARP
        run: |
          sudo apt update
          sudo apt install -y curl gpg
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt update
          sudo apt install -y cloudflare-warp

      - name: Connect to Cloudflare WARP (corrected syntax)
        run: |
          # Register and accept ToS with --accept-tos flag
          warp-cli --accept-tos registration new
          warp-cli connect
          sleep 5
          echo "WARP IP address:"
          curl -s ifconfig.me

      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp

      - name: Setup YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YT_COOKIES }}

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download video (144p)
        run: |
          yt-dlp -f "bestvideo[height<=144]+bestaudio/best" \
            -o "downloads/${{ inputs.output_filename }}.%(ext)s" \
            --merge-output-format mp4 \
            "${{ inputs.video_url }}"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Download YouTube 144p: ${{ inputs.video_url }}"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: "downloads/*"
