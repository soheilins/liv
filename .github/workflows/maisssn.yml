name: Download YouTube 144p (via Cloudflare WARP)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
        default: 'https://www.youtube.com/watch?v=GvhlIFJaqS4'
      output_filename:
        description: 'Output filename (without extension)'
        required: false
        type: string
        default: 'video_144p'

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install yt-dlp + FFmpeg + wireguard-tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg wireguard-tools curl
          pip install yt-dlp

      # ---------- Cloudflare WARP (free VPN) ----------
      - name: Setup Cloudflare WARP WireGuard tunnel
        run: |
          # Download the official Cloudflare WARP config for Linux
          curl -L -o /tmp/warp.conf https://repos.cloudflare.software/warp/warp.conf
          # Modify the config to use a free endpoint (optional, but works out of the box)
          sudo wg-quick up /tmp/warp.conf
          # Wait for the interface to come up
          sleep 5
          echo "WARP IP address:"
          curl -s ifconfig.me

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download video (144p) via WARP connection
        run: |
          # Format: best video stream with height <= 144 + best audio, merged into MP4
          yt-dlp -f "bestvideo[height<=144]+bestaudio/best[height<=144]" \
            -o "downloads/${{ inputs.output_filename }}.%(ext)s" \
            --merge-output-format mp4 \
            "${{ inputs.video_url }}"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Download YouTube 144p: ${{ inputs.video_url }}"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: "downloads/*"
